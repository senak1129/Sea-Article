version: "3.8"

services:
  # --- 服务发现 & 配置中心 ---
  etcd:
    container_name: etcd
    image: quay.io/coreos/etcd:v3.5.25
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/etcd:/etcd
    command: >
      etcd
      -advertise-client-urls=http://127.0.0.1:32379
      -listen-client-urls http://0.0.0.0:2379
      --data-dir /etcd
    ports:
      - "32379:2379"
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  # --- 关系型数据库 ---
  postgres:
    image: postgres:latest
    container_name: postgres
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    ports:
      - "35432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: Sea-TryGo
      POSTGRES_DB: first_db
    command: >
      -c max_connections=48
      -c idle_in_transaction_session_timeout=30000
      -c statement_timeout=60000
      -c lock_timeout=10000
      -c log_min_duration_statement=200
    restart: unless-stopped

  # --- 缓存 & 键值存储 ---
  redis:
    image: redis:latest
    container_name: redis
    deploy:
      resources:
        limits:
          memory: 256M
    ports:
      - "36379:6379"
    volumes:
      - ./conf:/etc/redis   # 核心：挂载整个目录
      - redis-data:/data
    command: redis-server /etc/redis/redis.conf
    restart: unless-stopped

  redis-sentinel:
    image: redis:latest
    container_name: redis-sentinel
    ports:
      - "26379:26379"
    volumes:
      - ./conf:/etc/redis   # 核心：挂载整个目录，解决重写失败
    command: redis-sentinel /etc/redis/sentinel.conf
    restart: unless-stopped
    depends_on:
      - redis

  redis_insight:
    image: redis/redisinsight:latest
    container_name: redisinsight
    ports:
      - "35540:5540"
    volumes:
      - redisinsight_data:/data
    depends_on:
      - redis
    restart: unless-stopped

  # --- Kafka ---
  kafka:
    image: apache/kafka:3.7.2
    container_name: kafka
    # 核心修改：使用 host 网络模式，抛弃端口映射
    network_mode: host
    deploy:
      resources:
        limits:
          memory: 1024M
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:19092,CONTROLLER://0.0.0.0:19094,EXTERNAL://0.0.0.0:49092
      # 注意这里的 EXTERNAL 端口改成了 49092，因为使用了 host 网络避开冲突
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://${KAFKA_BROKER1_IP}:19092,EXTERNAL://${KAFKA_EXTERNAL_HOST:-${KAFKA_BROKER1_IP}}:49092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@${KAFKA_BROKER1_IP}:19094,2@${KAFKA_BROKER2_IP}:9094,3@${KAFKA_BROKER3_IP}:9094
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qg
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=3
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=3
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=2
      - KAFKA_DEFAULT_REPLICATION_FACTOR=3
      - KAFKA_MIN_INSYNC_REPLICAS=2
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
    volumes:
      - /data/kafka:/var/lib/kafka/data
    restart: unless-stopped


  # --- Kafka UI ---
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "38080:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=Sea-TryGo-Cluster
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=172.17.0.1:19092
      - DYNAMIC_CONFIG_ENABLED=true
    depends_on:
      - kafka
    restart: unless-stopped

  # --- 对象存储 (MinIO) ---
  minio:
    container_name: minio
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_PROMETHEUS_AUTH_TYPE: public
    ports:
      - "39000:9000"
      - "39001:9001"
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped


  # ===================== Observability Stack =====================

  # --- Prometheus ---
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./prometheus/settings.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "39090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # --- Grafana ---
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "33000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

  # --- Jaeger (all-in-one) ---
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"     # UI
      - "36831:6831/udp"   # agent thrift compact
      - "36832:6832/udp"   # agent thrift binary
      - "14268:14268"     # collector http
      - "14250:14250"     # collector grpc
      - "34317:4317"       # OTLP gRPC
      - "34318:4318"       # OTLP HTTP
    restart: unless-stopped

  # ===================== Exporters for your components =====================

  # --- Postgres exporter ---
  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:latest
    container_name: postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://admin:Sea-TryGo@postgres:5432/first_db?sslmode=disable"
    depends_on:
      - postgres
    restart: unless-stopped

  # --- Redis exporter ---
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: redis-exporter
    environment:
      - REDIS_PASSWORD=123456
    command:
      - "--redis.addr=redis://redis:6379"
    depends_on:
      - redis
    restart: unless-stopped

  # --- Kafka exporter ---
  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: kafka-exporter
    command:
      - "--kafka.server=172.17.0.1:19092"
    depends_on:
      - kafka
    restart: unless-stopped


  # ===================== 你的业务微服务 =====================

  sea-article:
    image: senak1129/sea-article:${ARTICLE_IMAGE_TAG:-latest}
    container_name: sea-article
    restart: always
    network_mode: host
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    volumes:
      - ./logs/article:/app/log
    environment:
      - SERVICE_NAME=article
      - API_ENABLED=1
      - RPC_ENABLED=1
      - ETCD_ADDR=127.0.0.1:32379
      - REDIS_ADDR=127.0.0.1:36379
      - POSTGRES_ADDR=127.0.0.1
      - POSTGRES_PORT=35432
      - KAFKA_ADDR=${KAFKA_BROKER1_IP}:19092
      - MINIO_ADDR=127.0.0.1:39000
      - OTEL_ADDR=127.0.0.1:34317

  sea-user:
    image: senak1129/sea-user:${USER_IMAGE_TAG:-latest}
    container_name: sea-user
    restart: always
    network_mode: host
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    volumes:
      - ./logs/user:/app/log
    environment:
      - SERVICE_NAME=user
      - API_ENABLED=1
      - RPC_ENABLED=1
      - ETCD_ADDR=127.0.0.1:32379
      - REDIS_ADDR=127.0.0.1:36379
      - POSTGRES_ADDR=127.0.0.1
      - POSTGRES_PORT=35432
      - KAFKA_ADDR=${KAFKA_BROKER1_IP}:19092
      - MINIO_ADDR=127.0.0.1:39000
      - OTEL_ADDR=127.0.0.1:34317

  sea-admin:
    image: senak1129/sea-admin:${ADMIN_IMAGE_TAG:-latest}
    container_name: sea-admin
    restart: always
    network_mode: host
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    volumes:
      - ./logs/admin:/app/log
    environment:
      - SERVICE_NAME=admin
      - API_ENABLED=1
      - RPC_ENABLED=1
      - ETCD_ADDR=127.0.0.1:32379
      - REDIS_ADDR=127.0.0.1:36379
      - POSTGRES_ADDR=127.0.0.1
      - POSTGRES_PORT=35432
      - KAFKA_ADDR=${KAFKA_BROKER1_IP}:19092
      - MINIO_ADDR=127.0.0.1:39000
      - OTEL_ADDR=127.0.0.1:34317

  sea-message:
    image: senak1129/sea-message:${MESSAGE_IMAGE_TAG:-latest}
    container_name: sea-message
    restart: always
    network_mode: host
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    volumes:
      - ./logs/message:/app/log
    environment:
      - SERVICE_NAME=message
      - API_ENABLED=1
      - RPC_ENABLED=1
      - ETCD_ADDR=127.0.0.1:32379
      - REDIS_ADDR=127.0.0.1:36379
      - POSTGRES_ADDR=127.0.0.1
      - POSTGRES_PORT=35432
      - KAFKA_ADDR=${KAFKA_BROKER1_IP}:19092
      - MINIO_ADDR=127.0.0.1:39000
      - OTEL_ADDR=127.0.0.1:34317

  sea-security:
    image: senak1129/sea-security:${SECURITY_IMAGE_TAG:-latest}
    container_name: sea-security
    restart: always
    network_mode: host
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    volumes:
      - ./logs/security:/app/log
    environment:
      - SERVICE_NAME=security
      - API_ENABLED=0
      - RPC_ENABLED=1
      - ETCD_ADDR=127.0.0.1:32379
      - REDIS_ADDR=127.0.0.1:36379
      - POSTGRES_ADDR=127.0.0.1
      - POSTGRES_PORT=35432
      - KAFKA_ADDR=${KAFKA_BROKER1_IP}:19092
      - MINIO_ADDR=127.0.0.1:39000
      - OTEL_ADDR=127.0.0.1:34317


volumes:
  redis-data:
  prometheus_data:
  grafana_data:
  redisinsight_data:
networks:
  default:
    name: Sea-TryGo
