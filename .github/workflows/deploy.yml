name: Build and Deploy

on:
  push:
    branches: [ "main" ]

# 核心：防止多个 build 任务完成后同时 SSH 登录服务器导致部署冲突
concurrency:
  group: production_deploy
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: article
            api_path: ./service/article/api/
            rpc_path: ./service/article/rpc/
          - service: message
            api_path: ./service/message/api/
            rpc_path: ./service/message/rpc/
          - service: security
            api_path: ""
            rpc_path: ./service/security/rpc/
          - service: user
            api_path: ./service/user/user/api/
            rpc_path: ./service/user/user/rpc/
          - service: admin
            api_path: ./service/user/admin/api/
            rpc_path: ./service/user/admin/rpc/

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/sea-${{ matrix.service }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/sea-${{ matrix.service }}:${{ github.sha }}
          build-args: |
            SERVICE_NAME=${{ matrix.service }}
            BUILD_API=${{ matrix.api_path != '' && '1' || '0' }}
            BUILD_RPC=${{ matrix.rpc_path != '' && '1' || '0' }}
            API_BUILD_PATH=${{ matrix.api_path }}
            RPC_BUILD_PATH=${{ matrix.rpc_path }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy docker-compose.yaml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose.yaml"
          target: "/root/SeaTest"

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /root/SeaTest
            export ARTICLE_IMAGE_TAG=${{ github.sha }}
            export USER_IMAGE_TAG=${{ github.sha }}
            export ADMIN_IMAGE_TAG=${{ github.sha }}
            export MESSAGE_IMAGE_TAG=${{ github.sha }}
            export SECURITY_IMAGE_TAG=${{ github.sha }}
            for attempt in 1 2 3; do
              docker compose pull sea-article sea-user sea-admin sea-message sea-security && break
              if [ "$attempt" = "3" ]; then
                echo "docker compose pull failed after 3 attempts" >&2
                exit 1
              fi
              sleep 10
            done
            docker compose up -d --force-recreate --remove-orphans sea-article sea-user sea-admin sea-message sea-security
            docker image prune -f
