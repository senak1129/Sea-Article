name: Build and Deploy (Article Only)

on:
  push:
    branches: [ "main" ]
    # 1. 只有这些路径变动时才运行 CD
    paths:
      - 'service/article/**'
      - 'service/common/**'
      - 'proto/article.proto'
      - 'docker-compose.yaml'
      - '.github/workflows/deploy.yml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # 2. 简化 Matrix，只保留 article
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      # ... (省略中间的 Docker Login 等步骤) ...
      - name: Build and push Article
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/sea-article:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/sea-article:${{ github.sha }}
          build-args: |
            SERVICE_NAME=article
            BUILD_API=1
            BUILD_RPC=1
            API_BUILD_PATH=./service/article/api/
            RPC_BUILD_PATH=./service/article/rpc/

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Article Only
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /root/SeaTest
            # 3. 只更新 article 的 Tag
            export ARTICLE_IMAGE_TAG=${{ github.sha }}
            
            echo "Quick update for sea-article..."
            # 4. 只 Pull 和 Up 目标服务
            docker compose pull sea-article
            
            # 注意：去掉 --force-recreate，只更新有变动的服务
            # docker compose up -d 会自动识别 ARTICLE_IMAGE_TAG 的变化并仅重启 sea-article
            docker compose up -d sea-article
            
            echo "Article update complete."