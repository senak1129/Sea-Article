Name: article.rpc
ListenOn: 0.0.0.0:6666
Timeout: 70000
Etcd:
  Hosts:
  - 127.0.0.1:32379
  Key: article.rpc

Postgres:
  Host: 127.0.0.1
  Port: "35432"
  User: admin
  Password: "Sea-TryGo"
  DBName: first_db
  MaxOpenConns: 20
  MaxIdleConns: 10

BizRedis:
  Mode: sentinel
  Sentinel:
    - 127.0.0.1:26379
  Master: mymaster
  Pass: !!str "123456"
  ReadOnly: false

Log:
  ServiceName: article-rpc
  Mode: file
  Path: /app/log

Prometheus:
  Host: 0.0.0.0
  Port: 9092
  Path: /metrics

KqPusherConf:
  Name: article-mq-pusher
  Group: "article-creation-group"
  Brokers:
    - 127.0.0.1:49092
  Topic: article-creation-topic

MinIO:
  Endpoint: "127.0.0.1:39000"
  # 部署环境建议填写对外可访问的静态资源基址；留空时回退到 Endpoint。
  PublicBaseURL: ""
  AccessKeyID: "minioadmin"
  SecretAccessKey: "minioadmin"
  BucketName: "articles"
  UseSSL: false
  ImagePath: "articles/images/"
  ArticlePath: "articles/content/"

KqConsumerConf:
  Name: dataclean-consumer
  Brokers:
    - 127.0.0.1:49092
  Group: dataclean
  Topic: article-creation-topic
  Offset: first
  Consumers: 6

ArticleSyncPusherConf:
  Name: article-sync-pusher
  Group: article-sync-pusher
  Brokers:
    - 127.0.0.1:49092
  Topic: article-sync-events

ArticleSyncResultConsumerConf:
  Name: article-sync-result-consumer
  Brokers:
    - 127.0.0.1:49092
  Group: article-sync-result
  Topic: article-sync-results
  Offset: first
  Consumers: 1

ArticleSyncOutbox:
  PollIntervalMs: 1000
  BatchSize: 100
  MaxRetry: 10

Telemetry:
  Name: article-rpc
  Endpoint: localhost:34317     # OTLP gRPC 端口
  Sampler: 1.0
  Batcher: otlpgrpc            # 替代原来的 jaeger

HotEventPusherConf:
  Brokers:
    - 127.0.0.1:49092       # 指向基础架构的 Kafka 集群Topic: article-hot-events  # 强约束：必须为该固定 Topic
  Topic: article-hot-events

SecurityConf:
  Etcd:
    Hosts:
      - 127.0.0.1:32379
    Key: security.rpc
  Timeout: 10000

MessageRpc:
  Etcd:
    Hosts:
      - 127.0.0.1:32379
    Key: message.rpc
